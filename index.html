<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>꾸정왈계산기</title>
  <meta name="description" content="친구들과 함께 쓰는 공학용 계산기">
  <meta name="theme-color" content="#20242a">
  <meta property="og:type" content="website">
  <meta property="og:title" content="꾸정왈계산기">
  <meta property="og:description" content="카카오톡에서 눌러 바로 쓰는 공학용 계산기">
  <meta property="og:site_name" content="꾸정왈계산기">
  <style>
    :root {
      color-scheme: dark;
      --body: #20242a;
      --body-edge: #0d1117;
      --panel: #2d333d;
      --screen: #b8c6ad;
      --screen-ink: #1f2a21;
      --key: #343a44;
      --key-top: #4b5360;
      --key-text: #f3f6f9;
      --fn: #252b34;
      --fn-top: #3f4854;
      --shift: #d4a028;
      --alpha: #c14e5b;
      --op: #5c6470;
      --accent: #66a2ff;
      --equals: #2f6fb7;
      font-family: "Segoe UI", system-ui, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 20% 15%, rgba(102, 162, 255, 0.2), transparent 26rem),
        linear-gradient(135deg, #e7ecef 0%, #aab4bf 42%, #697583 100%);
      padding: 18px;
    }

    .calculator {
      width: min(430px, 100%);
      border-radius: 22px 22px 34px 34px;
      background: linear-gradient(145deg, #38404b, var(--body) 55%, #141920);
      border: 1px solid rgba(255, 255, 255, 0.18);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.16),
        inset 0 -16px 28px rgba(0, 0, 0, 0.35),
        0 28px 65px rgba(11, 16, 23, 0.45);
      padding: 18px;
    }

    .brand-row {
      display: flex;
      align-items: end;
      justify-content: space-between;
      margin: 0 4px 12px;
      letter-spacing: 0;
    }

    .brand-actions {
      display: flex;
      align-items: end;
      gap: 10px;
    }

    .brand {
      color: #f5f7fa;
      font-size: 1.35rem;
      font-weight: 800;
    }

    .model {
      color: #dce5ee;
      font-size: 0.82rem;
      font-weight: 700;
    }

    .solar {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 3px;
      width: 104px;
      height: 24px;
      padding: 3px;
      border-radius: 4px;
      background: #11151b;
      border: 1px solid rgba(255, 255, 255, 0.15);
    }

    .solar span {
      background: linear-gradient(180deg, #49351f, #251a12);
      border-radius: 2px;
    }

    .share-btn {
      width: 46px;
      height: 30px;
      border-radius: 8px;
      background: linear-gradient(180deg, #fee95a, #f5cf22);
      color: #2b2410;
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.65),
        inset 0 -3px 0 rgba(102, 82, 0, 0.22),
        0 3px 0 var(--body-edge);
      font-size: 0.72rem;
    }

    .voice-btn {
      width: 56px;
      height: 30px;
      border-radius: 8px;
      background: linear-gradient(180deg, #b6f2d1, #48b77d);
      color: #102418;
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.65),
        inset 0 -3px 0 rgba(20, 91, 52, 0.28),
        0 3px 0 var(--body-edge);
      font-size: 0.72rem;
    }

    .voice-btn.listening {
      background: linear-gradient(180deg, #ffd48a, #ef7d42);
      color: #251104;
    }

    .share-toast {
      position: fixed;
      left: 50%;
      bottom: 18px;
      z-index: 10;
      width: min(330px, calc(100% - 32px));
      transform: translate(-50%, 18px);
      border-radius: 8px;
      background: rgba(17, 22, 29, 0.94);
      color: #f7fafc;
      padding: 12px 14px;
      text-align: center;
      font-size: 0.88rem;
      line-height: 1.35;
      opacity: 0;
      pointer-events: none;
      transition: opacity 180ms ease, transform 180ms ease;
      box-shadow: 0 14px 38px rgba(0, 0, 0, 0.32);
    }

    .share-toast.show {
      opacity: 1;
      transform: translate(-50%, 0);
    }

    .screen-wrap {
      padding: 10px;
      border-radius: 9px;
      background: #171c22;
      border: 1px solid rgba(255, 255, 255, 0.13);
      box-shadow: inset 0 5px 12px rgba(0, 0, 0, 0.6);
      margin-bottom: 14px;
    }

    .screen {
      min-height: 118px;
      border-radius: 5px;
      background: linear-gradient(155deg, #d7e0cf, var(--screen));
      color: var(--screen-ink);
      border: 2px solid #7f8b78;
      padding: 12px;
      font-family: Consolas, "Courier New", monospace;
      box-shadow: inset 0 2px 8px rgba(29, 44, 31, 0.4);
      overflow: hidden;
    }

    .status {
      display: flex;
      justify-content: space-between;
      height: 18px;
      font-size: 0.72rem;
      font-weight: 800;
      opacity: 0.84;
    }

    .expression {
      height: 35px;
      margin-top: 5px;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
      font-size: clamp(0.84rem, 3vw, 1rem);
    }

    .result {
      min-height: 38px;
      display: flex;
      align-items: end;
      justify-content: end;
      font-size: clamp(1.55rem, 8vw, 2.35rem);
      font-weight: 800;
      line-height: 1;
      word-break: break-all;
      text-align: right;
    }

    .mode-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 10px;
    }

    .keypad {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
    }

    button {
      position: relative;
      min-width: 0;
      height: 44px;
      border: 0;
      border-radius: 7px 7px 12px 12px;
      background: linear-gradient(180deg, var(--key-top), var(--key));
      color: var(--key-text);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.18),
        inset 0 -4px 0 rgba(0, 0, 0, 0.24),
        0 3px 0 var(--body-edge);
      font: 800 0.92rem/1 "Segoe UI", system-ui, sans-serif;
      cursor: pointer;
      touch-action: manipulation;
    }

    button:active {
      transform: translateY(2px);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.13),
        inset 0 -2px 0 rgba(0, 0, 0, 0.24),
        0 1px 0 var(--body-edge);
    }

    .fn {
      background: linear-gradient(180deg, var(--fn-top), var(--fn));
      font-size: 0.78rem;
    }

    .op {
      background: linear-gradient(180deg, #75808d, var(--op));
    }

    .danger {
      background: linear-gradient(180deg, #e86b5e, #a8322f);
    }

    .equals {
      background: linear-gradient(180deg, #75a9e9, var(--equals));
    }

    .mode {
      height: 34px;
      border-radius: 16px;
      font-size: 0.78rem;
      color: #1d232b;
      background: linear-gradient(180deg, #e5edf5, #aeb8c3);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.8),
        inset 0 -3px 0 rgba(0, 0, 0, 0.18),
        0 3px 0 var(--body-edge);
    }

    .mode.active {
      color: #0e1b2a;
      background: linear-gradient(180deg, #8fc0ff, var(--accent));
    }

    .fn.active {
      outline: 2px solid var(--shift);
      outline-offset: 1px;
    }

    .shift::before,
    .alpha::before {
      position: absolute;
      top: 4px;
      left: 6px;
      font-size: 0.52rem;
      line-height: 1;
    }

    .shift::before {
      content: attr(data-shift);
      color: var(--shift);
    }

    .alpha::before {
      content: attr(data-alpha);
      color: var(--alpha);
    }

    .wide {
      grid-column: span 2;
    }

    @media (max-width: 390px) {
      .calculator {
        padding: 14px;
      }

      .keypad {
        gap: 6px;
      }

      button {
        height: 40px;
        font-size: 0.8rem;
      }

      .fn {
        font-size: 0.68rem;
      }

      .solar {
        width: 86px;
      }
    }
  </style>
</head>
<body>
  <main class="calculator" aria-label="Scientific calculator">
    <div class="brand-row">
      <div>
        <div class="brand">꾸정왈계산기</div>
        <div class="model">SCIENTIFIC CALCULATOR</div>
      </div>
      <div class="brand-actions">
        <button class="voice-btn" id="voiceInput" type="button" title="목소리로 계산">음성</button>
        <button class="share-btn" id="shareKakao" type="button" title="카카오톡으로 공유">공유</button>
        <div class="solar" aria-hidden="true">
          <span></span><span></span><span></span><span></span>
        </div>
      </div>
    </div>

    <section class="screen-wrap" aria-live="polite">
      <div class="screen">
        <div class="status">
          <span id="angleStatus">DEG</span>
          <span id="memoryStatus"></span>
          <span>COMP</span>
        </div>
        <div id="expression" class="expression"></div>
        <div id="result" class="result">0</div>
      </div>
    </section>

    <div class="mode-row" role="group" aria-label="angle mode">
      <button class="mode active" data-angle="DEG">DEG</button>
      <button class="mode" data-angle="RAD">RAD</button>
      <button class="mode" data-angle="GRA">GRA</button>
    </div>

    <section class="keypad" aria-label="calculator keys">
      <button class="fn shift" data-action="second" data-shift="2nd">SHIFT</button>
      <button class="fn alpha" data-action="memory-plus" data-alpha="M+">M+</button>
      <button class="fn alpha" data-action="memory-recall" data-alpha="MR">MR</button>
      <button class="fn alpha" data-action="memory-clear" data-alpha="MC">MC</button>
      <button class="danger" data-action="clear-all">AC</button>

      <button class="fn shift" data-value="sin(" data-shift="asin">sin</button>
      <button class="fn shift" data-value="cos(" data-shift="acos">cos</button>
      <button class="fn shift" data-value="tan(" data-shift="atan">tan</button>
      <button class="fn shift" data-value="log(" data-shift="10^x">log</button>
      <button class="fn shift" data-value="ln(" data-shift="e^x">ln</button>

      <button class="fn" data-value="sqrt(">√</button>
      <button class="fn" data-action="square">x²</button>
      <button class="fn" data-action="power">xʸ</button>
      <button class="fn" data-action="factorial">x!</button>
      <button class="fn" data-value="pi">π</button>

      <button class="fn" data-value="(">(</button>
      <button class="fn" data-value=")">)</button>
      <button class="fn" data-value="EXP">EXP</button>
      <button class="fn" data-action="percent">%</button>
      <button class="op" data-action="backspace">DEL</button>

      <button data-value="7">7</button>
      <button data-value="8">8</button>
      <button data-value="9">9</button>
      <button class="op" data-value="/">÷</button>
      <button class="op" data-action="reciprocal">1/x</button>

      <button data-value="4">4</button>
      <button data-value="5">5</button>
      <button data-value="6">6</button>
      <button class="op" data-value="*">×</button>
      <button class="op" data-action="toggle-sign">±</button>

      <button data-value="1">1</button>
      <button data-value="2">2</button>
      <button data-value="3">3</button>
      <button class="op" data-value="-">−</button>
      <button class="equals" data-action="equals">=</button>

      <button class="wide" data-value="0">0</button>
      <button data-value=".">.</button>
      <button class="op" data-value="+">+</button>
      <button class="op" data-action="ans">Ans</button>
    </section>
  </main>

  <div class="share-toast" id="shareToast" role="status" aria-live="polite"></div>

  <script>
    const expressionEl = document.querySelector("#expression");
    const resultEl = document.querySelector("#result");
    const angleStatusEl = document.querySelector("#angleStatus");
    const memoryStatusEl = document.querySelector("#memoryStatus");
    const voiceButton = document.querySelector("#voiceInput");
    const shareButton = document.querySelector("#shareKakao");
    const shareToast = document.querySelector("#shareToast");
    const keys = document.querySelector(".keypad");
    const modeButtons = document.querySelectorAll(".mode");

    let expression = "";
    let answer = 0;
    let memory = 0;
    let angleMode = "DEG";
    let secondMode = false;
    let toastTimer = 0;
    let recognition = null;
    let isListening = false;
    let voiceConversation = false;
    let shouldRestartVoice = false;

    const formatNumber = (value) => {
      if (!Number.isFinite(value)) return "Math ERROR";
      if (Object.is(value, -0)) return "0";
      const abs = Math.abs(value);
      if ((abs >= 1e12 || (abs > 0 && abs < 1e-9))) {
        return value.toExponential(8).replace(/\.?0+e/, "e");
      }
      return Number(value.toPrecision(12)).toString();
    };

    const toRadians = (value) => {
      if (angleMode === "RAD") return value;
      if (angleMode === "GRA") return value * Math.PI / 200;
      return value * Math.PI / 180;
    };

    const fromRadians = (value) => {
      if (angleMode === "RAD") return value;
      if (angleMode === "GRA") return value * 200 / Math.PI;
      return value * 180 / Math.PI;
    };

    const factorial = (value) => {
      if (value < 0 || !Number.isInteger(value) || value > 170) return NaN;
      let total = 1;
      for (let i = 2; i <= value; i += 1) total *= i;
      return total;
    };

    const sanitize = (text) => text
      .replaceAll("π", "pi")
      .replaceAll("÷", "/")
      .replaceAll("×", "*")
      .replaceAll("−", "-");

    const evaluate = (text) => {
      if (!text.trim()) return 0;
      let source = sanitize(text)
        .replaceAll("EXP", "e")
        .replaceAll("^", "**")
        .replace(/\bAns\b/g, "ans")
        .replace(/\bpi\b/g, "PI")
        .replace(/\be\b/g, "E");

      source = source
        .replace(/\bsin\(/g, "sin(")
        .replace(/\bcos\(/g, "cos(")
        .replace(/\btan\(/g, "tan(")
        .replace(/\basin\(/g, "asin(")
        .replace(/\bacos\(/g, "acos(")
        .replace(/\batan\(/g, "atan(")
        .replace(/\blog\(/g, "log10(")
        .replace(/\bln\(/g, "log(")
        .replace(/\bsqrt\(/g, "sqrt(");

      if (!/^[0-9+\-*/().,\sA-Z_a-z*!^]+$/.test(source)) {
        throw new Error("Invalid input");
      }

      const scope = {
        PI: Math.PI,
        E: Math.E,
        ans: answer,
        sin: (x) => Math.sin(toRadians(x)),
        cos: (x) => Math.cos(toRadians(x)),
        tan: (x) => Math.tan(toRadians(x)),
        asin: (x) => fromRadians(Math.asin(x)),
        acos: (x) => fromRadians(Math.acos(x)),
        atan: (x) => fromRadians(Math.atan(x)),
        log10: Math.log10,
        log: Math.log,
        sqrt: Math.sqrt,
        fact: factorial,
      };

      source = source.replace(/(\d+|\([^()]+\)|ans|PI|E)!/g, "fact($1)");
      const names = Object.keys(scope);
      const values = Object.values(scope);
      return Function(...names, `"use strict"; return (${source});`)(...values);
    };

    const updateScreen = (temporaryResult = null) => {
      expressionEl.textContent = expression;
      resultEl.textContent = temporaryResult ?? (expression ? "" : formatNumber(answer));
      angleStatusEl.textContent = angleMode + (secondMode ? "  S" : "");
      memoryStatusEl.textContent = memory ? "M" : "";
      document.querySelector("[data-action='second']").classList.toggle("active", secondMode);
    };

    const showToast = (message) => {
      window.clearTimeout(toastTimer);
      shareToast.textContent = message;
      shareToast.classList.add("show");
      toastTimer = window.setTimeout(() => {
        shareToast.classList.remove("show");
      }, 2600);
    };

    const shareCalculator = async () => {
      const pageUrl = location.protocol === "file:" ? "" : location.href;
      const resultText = expression
        ? `현재 입력식: ${expression}`
        : `최근 계산값: ${formatNumber(answer)}`;
      const text = `꾸정왈계산기\n${resultText}`;
      const shareData = {
        title: "꾸정왈계산기",
        text,
        url: pageUrl || undefined,
      };

      try {
        if (navigator.share && navigator.canShare?.(shareData) !== false) {
          await navigator.share(shareData);
          showToast("공유 창에서 카카오톡을 선택하면 됩니다.");
          return;
        }
      } catch (error) {
        if (error.name === "AbortError") return;
      }

      const copyText = pageUrl ? `${text}\n${pageUrl}` : text;
      try {
        await navigator.clipboard.writeText(copyText);
        showToast("공유 문구를 복사했습니다. 카카오톡 채팅방에 붙여넣으세요.");
      } catch {
        showToast("이 브라우저는 자동 공유를 지원하지 않습니다. 주소창 링크를 복사해 주세요.");
      }
    };

    const speak = (message, onDone = null) => {
      if (!("speechSynthesis" in window)) {
        if (onDone) window.setTimeout(onDone, 300);
        return;
      }
      window.speechSynthesis.cancel();
      const utterance = new SpeechSynthesisUtterance(message);
      utterance.lang = "ko-KR";
      utterance.rate = 0.95;
      utterance.onend = () => {
        if (onDone) onDone();
      };
      window.speechSynthesis.speak(utterance);
    };

    const answerByVoice = (message) => {
      showToast(message);
      speak(message, () => {
        if (voiceConversation) {
          window.setTimeout(() => startVoiceInput(true), 500);
        }
      });
    };

    const koreanNumberToValue = (input) => {
      const compact = input.replace(/\s+/g, "");
      if (/^-?\d+(\.\d+)?$/.test(compact)) return Number(compact);
      const digitMap = {
        "영": 0, "공": 0, "일": 1, "하나": 1, "한": 1,
        "이": 2, "둘": 2, "두": 2, "삼": 3, "셋": 3, "세": 3,
        "사": 4, "넷": 4, "네": 4, "오": 5, "다섯": 5,
        "육": 6, "륙": 6, "여섯": 6, "칠": 7, "일곱": 7,
        "팔": 8, "여덟": 8, "구": 9, "아홉": 9,
      };
      const unitMap = { "십": 10, "백": 100, "천": 1000 };
      let total = 0;
      let current = 0;
      let index = 0;

      while (index < compact.length) {
        let matched = false;
        for (const word of Object.keys(digitMap).sort((a, b) => b.length - a.length)) {
          if (compact.startsWith(word, index)) {
            current = digitMap[word];
            index += word.length;
            matched = true;
            break;
          }
        }
        if (matched) continue;

        const char = compact[index];
        if (unitMap[char]) {
          total += (current || 1) * unitMap[char];
          current = 0;
          index += 1;
          continue;
        }
        if (char === "만") {
          total = (total + current || 1) * 10000;
          current = 0;
          index += 1;
          continue;
        }
        return null;
      }
      return total + current;
    };

    const numberWordsToDigits = (text) => {
      const numberPattern = /([공영일이삼사오육륙칠팔구십백천만하나둘셋넷다섯여섯일곱여덟아홉한두세네]+|\d+(?:\.\d+)?)/g;
      return text.replace(numberPattern, (match) => {
        const value = koreanNumberToValue(match);
        return value === null ? match : String(value);
      });
    };

    const voiceToExpression = (spokenText) => {
      let text = spokenText
        .toLowerCase()
        .replace(/[,.?]/g, " ")
        .replace(/계산해줘|계산해|계산|얼마야|몇이야|답이 뭐야|답은 뭐야|결과는 뭐야|알려줘|해줘/g, " ")
        .replace(/파이/g, " pi ")
        .replace(/원주율/g, " pi ")
        .replace(/앤서|정답/g, " Ans ")
        .replace(/더하기|더해|플러스/g, " + ")
        .replace(/빼기|빼|마이너스/g, " - ")
        .replace(/곱하기|곱해|곱/g, " * ")
        .replace(/나누기|나눠|나누어|나눈/g, " / ")
        .replace(/제곱근|루트/g, " sqrt ")
        .replace(/코싸인|코사인|코싸인/g, " cos ")
        .replace(/싸인|사인|쌓인/g, " sin ")
        .replace(/탄젠트|탄잰트|탄/g, " tan ")
        .replace(/자연로그/g, " ln ")
        .replace(/로그/g, " log ")
        .replace(/제곱/g, " ^ 2 ")
        .replace(/점/g, " . ")
        .replace(/퍼센트|프로/g, " / 100 ")
        .replace(/도/g, " ")
        .replace(/[은는이가요]/g, " ");

      text = numberWordsToDigits(text);
      text = text.replace(/\b(sin|cos|tan|log|ln|sqrt)\s*([0-9.]+|pi|Ans)\b/g, "$1 $2");
      const tokens = text.trim().split(/\s+/).filter(Boolean);
      const result = [];

      for (let index = 0; index < tokens.length; index += 1) {
        const token = tokens[index];
        if (["sin", "cos", "tan", "log", "ln", "sqrt"].includes(token)) {
          const next = tokens[index + 1];
          if (next && !["+", "-", "*", "/", "^"].includes(next)) {
            result.push(`${token}(${next})`);
            index += 1;
          } else {
            result.push(`${token}(`);
          }
        } else if (/^[0-9.+\-*/^()]+$/.test(token) || token === "pi" || token === "Ans") {
          result.push(token);
        }
      }

      return result.join("");
    };

    const handleVoiceCommand = (spokenText) => {
      const command = spokenText.trim();
      if (!command) return;
      showToast(`들은 말: ${command}`);

      if (/그만|종료|멈춰|끝내|꺼줘|대화\s*끝/.test(command)) {
        voiceConversation = false;
        shouldRestartVoice = false;
        recognition?.stop();
        answerByVoice("음성 대화를 종료했습니다.");
        return;
      }

      if (/안녕|하이|여보세요/.test(command)) {
        answerByVoice("안녕하세요. 꾸정왈계산기입니다. 계산식을 말해 주세요.");
        return;
      }
      if (/사용법|도움말|뭘 할 수|뭐 할 수|어떻게/.test(command)) {
        answerByVoice("예를 들어 일 더하기 이, 삼 곱하기 사, 루트 구, 사인 삼십처럼 말하면 계산합니다.");
        return;
      }
      if (/고마워|감사/.test(command)) {
        answerByVoice("천만에요. 계속 듣고 있습니다. 계산할 것을 말해 주세요.");
        return;
      }
      if (/이름|누구/.test(command)) {
        answerByVoice("저는 꾸정왈계산기입니다. 목소리로 계산을 도와드립니다.");
        return;
      }
      if (/다시|못 알아|안 들려|안돼|안 되/.test(command)) {
        answerByVoice("천천히 또박또박 말해 주세요. 예를 들면 일 더하기 이 계산해줘라고 말하면 됩니다.");
        return;
      }

      if (/초기화|전체\s*삭제|클리어|지워/.test(command)) {
        runAction("clear-all");
        answerByVoice("초기화했습니다.");
        return;
      }
      if (/삭제|지우기|뒤로/.test(command)) {
        runAction("backspace");
        answerByVoice("하나 지웠습니다.");
        return;
      }

      const parsedExpression = voiceToExpression(command);
      if (!parsedExpression) {
        answerByVoice("계산식으로 알아듣지 못했습니다. 예를 들어 일 더하기 이라고 말해 주세요.");
        return;
      }

      expression = parsedExpression;
      try {
        answer = evaluate(expression);
        updateScreen(formatNumber(answer));
        expression = "";
        answerByVoice(`결과는 ${formatNumber(answer)} 입니다. 다음 계산을 말해 주세요.`);
      } catch {
        updateScreen("Syntax ERROR");
        answerByVoice("계산할 수 없는 식입니다. 조금 더 간단히 말해 주세요.");
      }
    };

    const startVoiceInput = (keepConversation = false) => {
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SpeechRecognition) {
        voiceConversation = false;
        answerByVoice("이 브라우저는 음성 인식을 지원하지 않습니다. 크롬이나 엣지에서 열어 주세요.");
        return;
      }
      if (isListening) {
        voiceConversation = false;
        shouldRestartVoice = false;
        recognition?.stop();
        answerByVoice("음성 대화를 종료했습니다.");
        return;
      }

      voiceConversation = true;
      shouldRestartVoice = keepConversation;
      recognition = new SpeechRecognition();
      recognition.lang = "ko-KR";
      recognition.interimResults = false;
      recognition.maxAlternatives = 1;
      isListening = true;
      voiceButton.classList.add("listening");
      voiceButton.textContent = "듣는중";
      showToast(keepConversation ? "계속 듣는 중입니다." : "말하세요. 예: 일 더하기 이, 루트 구, 사인 삼십");

      recognition.onresult = (event) => {
        shouldRestartVoice = false;
        const transcript = event.results[0][0].transcript;
        handleVoiceCommand(transcript);
      };
      recognition.onerror = (event) => {
        shouldRestartVoice = false;
        const message = event.error === "not-allowed"
          ? "마이크 권한이 필요합니다. 브라우저에서 마이크 허용을 눌러 주세요."
          : "음성을 알아듣지 못했습니다. 음성 버튼을 다시 누르고 천천히 말해 주세요.";
        if (event.error === "not-allowed") voiceConversation = false;
        answerByVoice(message);
      };
      recognition.onend = () => {
        isListening = false;
        voiceButton.classList.remove("listening");
        voiceButton.textContent = voiceConversation ? "대화중" : "음성";
        if (voiceConversation && shouldRestartVoice) {
          window.setTimeout(() => startVoiceInput(true), 500);
        }
      };
      recognition.start();
    };

    const append = (value) => {
      if (!expression && /^[+\-*/^]$/.test(value)) {
        expression = "Ans";
      }
      expression += value;
      updateScreen();
    };

    const appendFunction = (value) => {
      const secondMap = {
        "sin(": "asin(",
        "cos(": "acos(",
        "tan(": "atan(",
        "log(": "10^(",
        "ln(": "e^(",
      };
      expression += secondMode && secondMap[value] ? secondMap[value] : value;
      secondMode = false;
      updateScreen();
    };

    const wrapLast = (prefix, suffix = ")") => {
      if (!expression) {
        expression = `${prefix}Ans${suffix}`;
        updateScreen();
        return;
      }
      const match = expression.match(/(Ans|pi|e|\d+\.?\d*|\([^()]+\))$/);
      if (match) {
        expression = expression.slice(0, -match[0].length) + prefix + match[0] + suffix;
      } else {
        expression += prefix;
      }
      updateScreen();
    };

    const runAction = (action) => {
      if (action === "second") {
        secondMode = !secondMode;
        updateScreen();
        return;
      }
      if (action === "clear-all") {
        expression = "";
        answer = 0;
        secondMode = false;
        updateScreen();
        return;
      }
      if (action === "backspace") {
        expression = expression.slice(0, -1);
        updateScreen();
        return;
      }
      if (action === "equals") {
        try {
          answer = evaluate(expression);
          updateScreen(formatNumber(answer));
          expression = "";
        } catch {
          updateScreen("Syntax ERROR");
        }
        return;
      }
      if (action === "square") wrapLast("(", ")^2");
      if (action === "power") append("^");
      if (action === "factorial") append("!");
      if (action === "percent") wrapLast("(", ")/100");
      if (action === "reciprocal") wrapLast("1/(", ")");
      if (action === "toggle-sign") wrapLast("-(", ")");
      if (action === "ans") append("Ans");
      if (action === "memory-plus") {
        try {
          memory += expression ? evaluate(expression) : answer;
          expression = "";
          updateScreen(formatNumber(memory));
        } catch {
          updateScreen("Syntax ERROR");
        }
      }
      if (action === "memory-recall") append(formatNumber(memory));
      if (action === "memory-clear") {
        memory = 0;
        updateScreen();
      }
    };

    keys.addEventListener("click", (event) => {
      const button = event.target.closest("button");
      if (!button) return;
      const { value, action } = button.dataset;
      if (action) {
        runAction(action);
        return;
      }
      if (value && /^[a-z]+\(+$/.test(value)) appendFunction(value);
      else if (value) append(value);
    });

    modeButtons.forEach((button) => {
      button.addEventListener("click", () => {
        angleMode = button.dataset.angle;
        modeButtons.forEach((item) => item.classList.toggle("active", item === button));
        updateScreen();
      });
    });

    voiceButton.addEventListener("click", startVoiceInput);
    shareButton.addEventListener("click", shareCalculator);

    window.addEventListener("keydown", (event) => {
      const keyMap = {
        Enter: "equals",
        Backspace: "backspace",
        Escape: "clear-all",
      };
      if (/^[0-9+\-*/().]$/.test(event.key)) append(event.key);
      if (event.key === "^") append("^");
      if (keyMap[event.key]) runAction(keyMap[event.key]);
    });

    updateScreen();
  </script>
</body>
</html>
